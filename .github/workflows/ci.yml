name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-compiler.txt

      - name: Install pinned compiler dependencies
        run: python -m pip install --requirement requirements-compiler.txt

      - name: Compile Python entry points
        run: >-
          python -m py_compile
          skills/kern/scripts/kern_cache.py
          skills/kern/scripts/kern_compile.py
          skills/kern/scripts/render_ir.py
          benchmarks/token_bench.py

      - name: Run Python suite
        run: python -m unittest discover -s tests -v

      - name: Verify committed deterministic benchmark
        if: matrix.python-version == '3.13'
        run: |
          python benchmarks/token_bench.py skills/kern/scripts/kern_cache.py \
            --out /tmp/python-det-v2.json > /dev/null
          diff -u benchmarks/results/python-det-v2.json /tmp/python-det-v2.json

  web:
    name: Static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
